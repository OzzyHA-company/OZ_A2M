# OZ_A2M Mosquitto Configuration

# 기본 설정
pid_file /var/run/mosquitto/mosquitto.pid
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# 리스너 설정
listener 1883 0.0.0.0
protocol mqtt

# WebSocket 리스너
listener 9001 0.0.0.0
protocol websockets

# 인증 설정 (개발환경에서는 allow_anonymous)
allow_anonymous true

# 성능 튜닝
max_keepalive 60
max_inflight_messages 40
max_queued_messages 200
message_size_limit 102400

# 영속성 설정
autosave_interval 1800
autosave_on_changes false

# 로그 설정
log_type error
log_type warning
log_type information
log_type subscribe
log_type unsubscribe

# 연결 설정
retry_interval 20
sys_interval 10

# 브리지 설정 (필요시)
# connection bridge-name
# address remote-broker:1883
# topic # both 0 local/ remote/
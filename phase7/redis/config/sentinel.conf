# Redis Sentinel Configuration for OZ_A2M
port 26379
daemonize no
supervised no

# Monitor masters
sentinel monitor oza2m-master-1 redis-master-1 6379 2
sentinel down-after-milliseconds oza2m-master-1 5000
sentinel parallel-syncs oza2m-master-1 1
sentinel failover-timeout oza2m-master-1 10000

sentinel monitor oza2m-master-2 redis-master-2 6379 2
sentinel down-after-milliseconds oza2m-master-2 5000
sentinel parallel-syncs oza2m-master-2 1
sentinel failover-timeout oza2m-master-2 10000

sentinel monitor oza2m-master-3 redis-master-3 6379 2
sentinel down-after-milliseconds oza2m-master-3 5000
sentinel parallel-syncs oza2m-master-3 1
sentinel failover-timeout oza2m-master-3 10000

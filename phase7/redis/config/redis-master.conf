# Redis Master Configuration for OZ_A2M
bind 0.0.0.0
port 6379
daemonize no
supervised no

# Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# AOF
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory Management
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Logging
loglevel notice

# Security
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command KEYS ""

# Performance
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
